name: Keep Backend Alive

on:
  schedule:
    # Ping every 10 minutes to prevent Render free tier from sleeping
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging backend to prevent cold start..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://kyokushin-api.onrender.com/health)
          echo "Response status: $STATUS"
          if [ "$STATUS" -eq 200 ]; then
            echo "Backend is alive"
          else
            echo "Backend returned $STATUS — may be waking up"
            # Retry once after 30s if first attempt fails (cold start)
            sleep 30
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://kyokushin-api.onrender.com/health)
            echo "Retry status: $STATUS"
          fi
